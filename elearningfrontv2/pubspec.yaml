name: elearningfrontv2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- CORE & NETWORK ---
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  provider: ^6.1.2
  intl: ^0.19.0

  # --- UI & CHARTS ---
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  file_picker: ^8.0.0

  # --- MEDIA ---
  video_player: ^2.8.6
  camera: ^0.10.5+9

  # --- IA / TFLite (sans le helper obsolète) ---
  tflite_flutter: ^0.11.0      # dernière stable
  # tflite_flutter_helper supprimé – voir note plus bas
  image: ^4.2.0
  uuid: ^4.4.0

  # --- JSON ---
  json_annotation: ^4.9.0

  # --- ICONS ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/